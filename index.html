<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THINLINES - Temporary Downtime</title>

<style>

/*
HOW TO USE

1. Change the text inside the "reason" div to explain why the site is down.
2. Upload this file to your web server as index.html.
3. When your site is fixed, replace this file with your normal website.

Everything below controls the styling and animation.
*/

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background:#0a0a0a;
    color:white;
    overflow:hidden;
}

/* Animated thin line background */

.lines{
    position:absolute;
    width:100%;
    height:100%;
}

.line{
    position:absolute;
    width:1px;
    height:100%;
    background:rgba(255,255,255,0.08);
    animation:move 8s linear infinite;
}

@keyframes move{
    0%{transform:translateY(-100%);}
    100%{transform:translateY(100%);}
}

/* Center container */

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    max-width:600px;
}

/* Title styling */

.title{
    font-size:60px;
    letter-spacing:8px;
    font-weight:700;
    margin-bottom:10px;
}

/* Subtitle */

.subtitle{
    font-size:18px;
    opacity:0.7;
    margin-bottom:30px;
}

/* Reason box */

.reason{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:8px;
    font-size:16px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    opacity:0.5;
}

</style>
</head>

<body>

<div class="lines">

<!--
HOW TO ADD MORE LINES

Duplicate one of these divs and change the left percentage.
This spreads thin lines across the page.
-->

<div class="line" style="left:10%; animation-delay:0s;"></div>
<div class="line" style="left:20%; animation-delay:1s;"></div>
<div class="line" style="left:30%; animation-delay:2s;"></div>
<div class="line" style="left:40%; animation-delay:3s;"></div>
<div class="line" style="left:50%; animation-delay:4s;"></div>
<div class="line" style="left:60%; animation-delay:5s;"></div>
<div class="line" style="left:70%; animation-delay:2s;"></div>
<div class="line" style="left:80%; animation-delay:4s;"></div>
<div class="line" style="left:90%; animation-delay:6s;"></div>

</div>

<div class="container">

<div class="title">THINLINES</div>

<div class="subtitle">
Service Temporarily Unavailable
</div>

<div class="reason">

<!--
CHANGE THE MESSAGE BELOW TO EXPLAIN WHY YOUR SITE IS DOWN
-->

Due to needing to preform major bugpatches, and creating joint updates the site is down.
Fortunately no one can play this, but yeah. TIMER BROKE

</div>

<div class="footer">
THINLINES
</div>

</div>

</body>
</html>
